# Docker Cheat Sheet

## 🏗️ Image Management

Images are the read-only blueprints for your containers.

| Command | Description |
| --- | --- |
| `docker build -t <name> .` | Build an image from a Dockerfile in the current directory. |
| `docker images` | List all locally stored images. |
| `docker pull <image>` | Download an image from Docker Hub. |
| `docker push <image>` | Upload an image to a registry (Docker Hub). |
| `docker rmi <image_id>` | Remove a specific image. |
| `docker image prune` | Remove all dangling (unused) images. |

---

## 🚀 Container Lifecycle

Commands to create, start, and stop your application environments.

* **`docker run -it <image>`**: Create and start a container in interactive mode.
* **`docker run -d <image>`**: Run a container in the background (detached mode).
* **`docker run -p 8080:80 <image>`**: Run a container and map host port 8080 to container port 80.
* **`docker ps`**: List only running containers.
* **`docker ps -a`**: List all containers (including stopped ones).
* **`docker stop <container_id>`**: Gracefully stop a running container.
* **`docker start <container_id>`**: Start a stopped container.
* **`docker rm <container_id>`**: Remove a stopped container.
* **`docker rm -f $(docker ps -aq)`**: **Danger:** Force remove all containers on the system.

---

## 🔍 Inspection & Debugging

Use these when things aren't working as expected.

* **`docker logs -f <container_id>`**: Tail the live logs of a container.
* **`docker exec -it <container_id> sh`**: Open an interactive shell inside a running container.
* **`docker inspect <object_id>`**: Get detailed JSON metadata about a container or image.
* **`docker stats`**: View real-time resource usage (CPU, Memory, Network) for all containers.
* **`docker top <container_id>`**: Display the running processes inside a container.

---

## 🌐 Networking & Volumes

Managing data persistence and connectivity.

### Volumes (Data)

* **`docker volume ls`**: List all volumes.
* **`docker volume create <name>`**: Create a new named volume.
* **`docker volume rm <name>`**: Delete a volume.

### Networks

* **`docker network ls`**: List all networks.
* **`docker network create <name>`**: Create a new user-defined network.
* **`docker network connect <network> <container>`**: Connect an existing container to a network.

---

## 🧹 System Cleanup

Keep your disk space in check.

* **`docker system df`**: Show Docker disk usage.
* **`docker system prune`**: Remove all unused containers, networks, and images (add `-a` to remove unused images too).

---

## 🛠️ Docker Compose

For managing multi-container applications (usually defined in `docker-compose.yml`).

* **`docker compose up -d`**: Build, create, and start all services in the background.
* **`docker compose down`**: Stop and remove containers, networks, and images created by `up`.
* **`docker compose logs -f`**: View output from all running services.
* **`docker compose ps`**: List containers associated with the current Compose file.
